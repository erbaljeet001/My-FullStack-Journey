<!DOCTYPE html>
<html lang="en">
<head>
   <script>
     let day =7;
     switch(day)
     {
      case 1:
        console.log("Monday");
        break;
        case 2:
        console.log("Tuesday");
        break;
        case 3:
        console.log("Wednesday");
        break;
        case 4:
        console.log("Thursday");
        break;
        case 5:
        console.log("Friday");
        break;
        case 6:
        console.log("Saturday");
        break;
        default :
        {
           console.log("Sunday");
           
        }
        
     }
   </script>
</head>
<body>
  
</body>
</html>
