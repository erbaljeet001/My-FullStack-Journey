<!DOCTYPE html>
<html lang="en">
<head>
  <script>

    let num1=20;
    let num2= 4;
    let choice = "+";
    if(choice == "+")
    
    {
        console.log("Addition  :",num1+num2);
        
    }

    else if(choice == "-")
    {
      console.log("Subtraction  :",num1-num2);
    }
    else if(choice == "*")
    {
        console.log("Multiplication  :",num1*num2);
    }
    else if(choice == "/")
  
    {
      console.log("Division  :",num1/num2);
    }
    else
    {
      console.log("Invalid Choice");
    }


  </script>


</head>

</body>
</html>
