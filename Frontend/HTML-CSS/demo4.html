      <marquee behavior="slide" loop="100" behavior="slide" space="70px" vspace="30px"  bgcolor =" green" Direction="down" height="150px"> <h1>Techpile Technology Private Limited</h1> </marquee>

      <marquee space="40px" vspace="10px" bgcolor="dark   red" Direction="left"  scrollamount="20"> <h1>Techpile Technology Private Limited</h1> </marquee>
