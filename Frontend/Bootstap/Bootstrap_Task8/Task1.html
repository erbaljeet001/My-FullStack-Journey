<html>
  <head>
      <link rel="stylesheet" href="css/bootstrap.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
      <style>
   .bg-mybackground
{
    background: linear-gradient(
        135deg,
        #02000c 0%,
        #2e1768 25%,
        #2c0237 50%,
        #02010e 75%,
        #08011e 100%
    );
  
}
   .h
   {
    min-height: 600px;
   }
   .form-control
   {
    background: none;
    height: 50px;
    border:none;
    border-bottom: 2px solid white;
    box-shadow: 0px 0px 0px 0px white ;
    


   }
   .btn
   {
       height: 60px;
       background: #c11b6e;
       border-radius: 40px;
       margin-left: 40%;
      margin-top: 150px;
      width: 240px;
   }
  

      </style>
  </head>
   <body class="bg-mybackground ">
    <div class="container border rounded-4 mt-4 p-5 h">

    <div class="text-center text-white">
        <div class="fs-1 "><b>Event Registration</b></div>
        <p><b>Register with us to get more details.</b></p>
    </div>

    
    <div class="mt-5 text-white ms-2 fs-3">Name</div>

    <div class="row gx-4">
        <div class="col-sm-6 ">
            <div class="input-group">
                <b class="input-group-text bg-transparent border-0 text-white">
                    <i class="fa-regular fa-user"></i>
            </b>
                <input type="text" class="form-control">
            </div>
            <small class="text-white fs-5 ms-2 ">First</small>
        </div>

        <div class="col-sm-6">
            <div class="input-group ">
                
                <input type="text" class="form-control">
            </div>
            <small class="text-white fs-5">Last</small>
        </div>
    </div>
   <div class="mt-5 text-white ms-2 fs-3">Email</div>
    <div class="col-sm-12">
            <div class="input-group ">
                <span class="input-group-text bg-transparent border-0 text-white">
                   <i class="fa-regular fa-envelope"></i>
                </span>
                <input type="text" class="form-control">
            </div>
            <small class="text-white"></small>
        </div>
   <div class="mt-5 text-white ms-2 fs-3">Phone</div>
    <div class="col-sm-12">
            <div class="input-group ">
                <span class="input-group-text bg-transparent border-0 text-white">
                   <i class="fa-solid fa-mobile "></i>
                </span>
                <input type="text" class="form-control">
            </div>
            <small class="text-white"></small>
        </div>  
        
   <div class="mt-5 text-white ms-2 fs-3">Topic</div>
    <div class="col-sm-12">
                <input type="text" class="form-control">
        </div> 
         
   <div class="mt-5 text-white ms-2 fs-3 ">Preferred Slot</div>     
    <div class="col-sm-12">
      <input type="text" class="form-control">
    </div>
    <button class="btn text-white fs-3 ">Sign me up</button>
</div>
   </body>
</html>
