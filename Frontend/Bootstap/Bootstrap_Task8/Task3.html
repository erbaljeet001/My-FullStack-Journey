<!DOCTYPE html>
<html>
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
   <link rel="stylesheet" href="css/bootstrap.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
         <style>
     
          .my-background
          {
            background: linear-gradient(rgba(163, 162, 238),rgb(53, 57, 140)) !important;
             min-height: 800px;
            max-width: 1000px;
            margin: 100px auto;

          }
          .container
          {
             background: url("images/images1.jpg");
             background-size:cover;
              width: 100%;
              max-width: 600px;
             
          }
          .h
          {
            min-height: 300px;
            width: 90%;
          max-width: 250px;
            margin: 100px auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid white;

          }
          .btn
          {
            min-height: 10px;
            width: 200px;
            background: white;
            border-radius: 20px;
            margin-bottom: 12px;
          }
          .btn:hover
       {
          background: white !important;
           color: black !important;
       }

          
         </style>
  </head>

  
    <body class="my-background">
     <div class="container rounded-4">
      <div class="row ">
      <div class="col-sm-12 fs-4 h text-center mt-5 p-4 text-light  rounded-4">

        <div><b >Login</b></div>

    <div class="input-group pt-4  ">
    
    <input type="email" 
           placeholder="Email ID"
           class="form-control rounded-start-4 ">

    <b class="input-group-text rounded-end-4">
        <i class="fa-regular fa-envelope"></i>
    </b>

</div>

 <div class="input-group pt-4 ">
    
    <input type="password" 
           placeholder="Password"
           class="form-control rounded-start-4 ">

    <b class="input-group-text rounded-end-4 ">
       <i class="fa-solid fa-lock"></i>
    </b>



</div>

<div class="d-flex justify-content-between mt-3">

    <div class="form-check" style="font-size: 10px;">
        <input class="form-check-input" type="checkbox" id="rememberMe">

        <label class="form-check-label" for="rememberMe">
            Remember Me
        </label>
    </div>

    <a href="#" class="text-light" style="font-size: 10px;">
        Forgot Password?
    </a>

</div>


<div>
  <button class="btn">Login</button>
  

</div>

  <p style="font-size: 10px;">Don't have an account? <b>Register</b></p> 
      </div>

      
      </div>
     </div>

    </body> 
   
  </body>
</html>
