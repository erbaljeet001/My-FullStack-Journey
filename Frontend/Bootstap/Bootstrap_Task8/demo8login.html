<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/bootstrap.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
.bg-mycolor
{
    background: peru !important;
    min-height: 100vh;
}

.text-mycolor
{
    color: peru !important;
}

.form-control
{
    height: 40px;
}

.btn
{
    height: 50px;
    width: 100%;
}
</style>

</head>

<body class="bg-mycolor">

<div class="container-fluid">
    <div class="row mt-5 pt-5">

        <div class="col-11 col-sm-8 col-md-6 col-lg-4 mt-5 mx-auto bg-light rounded-4 p-4 shadow-lg">

            <div class="fs-3 text-center mb-4">
                Login <b class="text-mycolor">Form</b>
            </div>

            
             
            <div class="input-group mb-3">

                <span class="input-group-text">
                    <i class="fa-regular fa-user"></i>
                </span>

                <input type="text"
                       class="form-control shadow-lg"
                       placeholder="Userid">

            </div>

          
            <div class="mb-3">
                Password
                <input type="password"
                       class="form-control shadow-lg mt-1"
                       placeholder="Password">
            </div>

           
            <button class="btn btn-dark">
                Login
            </button>

        </div>

    </div>
</div>

</body>
</html>
