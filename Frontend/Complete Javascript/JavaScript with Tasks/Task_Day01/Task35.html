<!DOCTYPE html>
<html lang="en">
<head>
     <script>
       let color=prompt("Enter the traffic color :")
       switch(color)
       {
        case "red":
          console.log("Stop");
          break;
        case "yellow":
          console.log("Wait");
          break;  
        case "green":
          console.log("Go");
          break;  
        default :
           console.log("Invalid Color");
             

          
       }
       
     </script>
</head>

</body>
</html>
