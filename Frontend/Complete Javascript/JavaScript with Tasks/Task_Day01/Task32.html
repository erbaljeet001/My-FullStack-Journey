<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        let num1= 50;
        let num2= 10;
        let operator = "-";
         switch(operator)
         {
            case "+":
              console.log(num1+num2);
              break;
            case "-":
              console.log(num1-num2);
              break;  
            case "*":
              console.log(num1*num2);
              break;
            case "/":
              console.log(num1/num2);
              break; 
            case "%":
              console.log(num1%num2);
              break; 
            default :
               console.log("Invalid choice");
                      
              
         }
    </script>
</head>
<body>
  
</body>
</html>
