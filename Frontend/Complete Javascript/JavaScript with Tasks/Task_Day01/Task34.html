<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      let Grade = prompt("Enter your Grade :")
      switch(Grade)
      {
        case "A":
          console.log("Excellent");
          break;
        case "B":
          console.log("Very Good");
          break;
        case "C":
          console.log("Good");
          break;
        case "D":
          console.log("Needs improvement");
          break;
        case "F":
          console.log("Fail");
          break;     
          
      }
    </script>
</head>

</html>
