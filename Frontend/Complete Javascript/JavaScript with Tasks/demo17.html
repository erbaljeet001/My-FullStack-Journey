<!DOCTYPE html>
<html lang="en">
<head>
    <script>
       let player=['virat','Dhoni','rohit','pant']
       let removedPlayer=player.splice(0,2);
       console.log(removedPlayer);
       

       // reversing
        let players=['virat','Dhoni','rohit','pant']
     let reverse=players.reverse()
     console.log(reverse);
     

     // push 
     players.push('Suryavanshi');
     console.log(players);
     

     //pop

     players.pop()
     console.log(players);

     // join

     let UseJoin=players.join("=")
     console.log(UseJoin);
     
    </script>
</head>
