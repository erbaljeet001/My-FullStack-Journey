<html>
  <head>
    <title>Login Form</title>
    <style>
      body{
        background: #00897B;
        font-family: Arial, Helvetica, sans-serif ;
      }
      #login
      {
        min-height: 350px;
        width: 500px;
        background: rgb(166, 169, 194);
        margin: 250px auto;
        border-radius: 10px;
        padding: 50px ;
        box-sizing: border-box;
        transition: all 1s;
      }

      #login:hover{
        background: rgb(157, 157, 115);
        transition: all 1s;
      }
      

      #heading
      {
        font-size: 30px;
        text-align:center;
      }

      .txt
      {
        height: 40px;
        width: 100%;
        margin-bottom: 10px;
        background: #c9d3d1;
        padding-left: 10px;
        box-sizing: border-box;
        color: #055945;
        font-weight: bold;
        /* border: 2px solid #00897B; */
        border: none;
        border-radius: 100px;
        
      }

      ::placeholder
      {
        color: #109173;
      }

      .btn
      {
        height: 40px;
        width: 100%;
        background: #0bf1bc;
        color: white;
        border: none;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bold;
        border-radius: 100px;

      }
    </style>
  </head>
  <body>
    <div id="login">
         <div id="heading">LOGIN <b style="color: #00897B;">FORM</b></div>
         
      
         UserId  <br><input height="50px" width="50px" type="text" class="txt"  placeholder="Enter UserId..."> 
         <br>
         Password  <br><input type="password" class="txt" placeholder=" Password.."> <br>
        
         <input type="submit" class="btn"  value="Login"/>
    </div>
  </body>
</html>
